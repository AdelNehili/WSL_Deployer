services:
  filebrowser:
    image: filebrowser/filebrowser
    container_name: filebrowser
    environment:
      - PUID=1000 #"id $user" to find your uid & gid values
      - PGID=1000
    volumes:
      - /home/tutoirl/docker/Filebrowser/admin/data:/srv
      - /home/tutoirl/docker/Filebrowser/admin/database:/database
      - /home/tutoirl/docker/Filebrowser/admin/config:/config
    ports:
      - 8081:80 #default port is 8080, change as needed. Don't change the right hand side port (port 80)
    restart: unless-stopped