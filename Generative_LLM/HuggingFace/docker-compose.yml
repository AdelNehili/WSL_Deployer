services:
  hf-cpu:
    build: .
    container_name: hf-cpu-server
    ports:
      - "8000:8000"
    environment:
      MODEL_ID: Qwen/Qwen2.5-0.5B-Instruct
      HF_HOME: /data/huggingface
      TRANSFORMERS_CACHE: /data/huggingface
      HF_HUB_DISABLE_TELEMETRY: "1"
      OMP_NUM_THREADS: "4"
      MKL_NUM_THREADS: "4"
    volumes:
      - ./data:/data
    restart: unless-stopped